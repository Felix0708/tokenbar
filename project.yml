name: TokenBar
options:
  bundleIdPrefix: com.donguri
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  TokenBar:
    type: application
    platform: macOS
    sources:
      - App
      - Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: TokenBar
        LSUIElement: true
        CFBundleIconFile: AppIcon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donguri.tokenbar
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: TokenBarWidget
        embed: true
  TokenBarWidget:
    type: app-extension
    platform: macOS
    sources:
      - Widget
      - Shared
      - path: App/Resources/AppIcon.icns
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: TokenBar Widget
        CFBundleIconFile: AppIcon
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/TokenBarWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.temporary-exception.files.home-relative-path.read-only:
          - /Library/Application Support/TokenBar/
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donguri.tokenbar.widget
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
